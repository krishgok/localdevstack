<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="LocalDevelopmentStack — spin up a production-shaped local stack in 30 seconds">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- subtle grid texture -->
  <g stroke="#21262d" stroke-width="1" opacity="0.5">
    <line x1="0" y1="64"  x2="1280" y2="64"/>
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="192" x2="1280" y2="192"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
  </g>

  <!-- terminal traffic-light dots -->
  <circle cx="40" cy="40" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="40" r="6" fill="#febc2e"/>
  <circle cx="84" cy="40" r="6" fill="#28c840"/>

  <!-- left accent bar -->
  <rect x="60" y="100" width="6" height="120" fill="url(#accent)" rx="3"/>

  <!-- title -->
  <text x="100" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="52" font-weight="700" fill="#f0f6fc">LocalDevelopmentStack</text>

  <!-- tagline -->
  <text x="100" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" fill="#8b949e">Spin up a production-shaped local stack in 30 seconds.</text>

  <!-- shell prompt -->
  <text x="100" y="246" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$</text>
  <text x="124" y="246" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f0f6fc">localdevstack --service go --database postgres</text>

  <!-- language dots + caption -->
  <g transform="translate(100, 280)">
    <circle cx="0"   cy="0" r="4" fill="#58a6ff"/>
    <circle cx="14"  cy="0" r="4" fill="#a371f7"/>
    <circle cx="28"  cy="0" r="4" fill="#f0883e"/>
    <circle cx="42"  cy="0" r="4" fill="#3fb950"/>
    <circle cx="56"  cy="0" r="4" fill="#d29922"/>
    <circle cx="70"  cy="0" r="4" fill="#db61a2"/>
    <circle cx="84"  cy="0" r="4" fill="#ff7b72"/>
    <circle cx="98"  cy="0" r="4" fill="#79c0ff"/>
    <circle cx="112" cy="0" r="4" fill="#8957e5"/>
    <text x="130" y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6e7681">9 languages · 8 databases · 4 migration tools · 2 companions</text>
  </g>
</svg>
