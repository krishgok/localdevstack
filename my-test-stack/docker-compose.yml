# WARNING: these credentials are for LOCAL DEVELOPMENT ONLY.
# Change POSTGRES_PASSWORD before committing or deploying to any shared environment.

services:
  db:
    image: postgres:16
    container_name: local-postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  my-test-api-service:
    build:
      context: ./service
      dockerfile: Dockerfile.dev
    container_name: local-my-test-api-service
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_only@db:5432/app_db
    volumes:
      - ./service:/app
      - /app/build
      - /app/.gradle
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data: